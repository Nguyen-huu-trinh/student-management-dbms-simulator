<!DOCTYPE html>
<html>
<head>
    <title>Student Manager</title>
    <script src="https://unpkg.com/vue@3"></script>

    <style>
        body {
            font-family: Arial;
        }

        ul.tree, ul.tree ul {
            list-style-type: none;
            position: relative;
        }

        ul.tree ul {
            margin-left: 20px;
        }

        ul.tree li {
            margin: 5px 0;
            padding-left: 20px;
            position: relative;
            font-family: monospace;
        }

        ul.tree li::before {
            content: "├──";
            position: absolute;
            left: 0;
        }

        ul.tree li:last-child::before {
            content: "└──";
        }

        .index {
            color: red;
        }
    </style>
</head>

<body>

<div id="app">

    <h1>Quản lý sinh viên</h1>

    <!-- FORM -->
    <input v-model="id" placeholder="Mã SV">
    <input v-model="name" placeholder="Tên">
    <input v-model="gender" placeholder="Giới tính">
    <button @click="addStudent">Thêm</button>

    
    <h2>Tìm kiếm</h2>
    <input v-model="keyword" placeholder="Nhập mã hoặc tên">
    <button @click="searchStudent">Tìm</button>

    <ul>
        <li v-for="s in searchResult" :key="s.id" style="color:blue">
            {{ s.id }} - {{ s.name }}
        </li>
    </ul>
    <p style="color:red; font-weight:bold" v-if="message">
        {{ message }}
    </p>
    <!-- LIST -->
    <h2>Danh sách</h2>
    <ul>
        <li v-for="s in students" :key="s.id">
            {{ s.id }} - {{ s.name }}
            <button 
                @click="deleteStudent(s.id)" 
                style="font-size: 8px; padding: 2px 5px;"
            >
                ❌
            </button>
                </li>
    </ul>

    <!-- TREE -->
    <h2>B-Tree</h2>
    <div v-html="renderTree(tree)"></div>

</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            students: [],
            tree: {},
            id: "",
            name: "",
            gender: "",
            keyword: "",
            searchResult: [],
            highlightKeys: [],
            message: ""
        }
    },

    methods: {

        async load() {
            let res = await fetch("/students");
            this.students = await res.json();

            let t = await fetch("/btree");
            this.tree = await t.json();
        },

        async addStudent() {
            await fetch("/add", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    id: this.id,
                    name: this.name,
                    gender: this.gender
                })
            });

            this.id = "";
            this.name = "";
            this.gender = "";

            this.load();
        },

        async deleteStudent(id) {
            await fetch("/delete/" + id, {
                method: "DELETE"
            });

            this.load();
        },

         async searchStudent() {
            let res = await fetch("/search?keyword=" + this.keyword);
            let data = await res.json();

            this.searchResult = data.result;
            this.highlightKeys = data.highlightKeys; 
             if (data.result.length === 0) {
                this.message = "Sinh viên không tồn tại";
            } else {
                this.message = "";
            }
        },

        renderTree(node) {
            if (!node || !node.keys) return "";

            let html = "<ul class='tree'>";
            html += "<li>";

            html += "<b>[ ";
            node.keys.forEach((key, i) => {

                if (this.highlightKeys.includes(key)) {
                    html += `<span style="
                        color:white;
                        background:red;
                        padding:2px 6px;
                        border-radius:6px;
                        font-weight:bold;
                    ">
                        ${key} (${node.values[i]})
                    </span>`;
                } else {
                    html += `${key} (${node.values[i]})`;
                }

                if (i < node.keys.length - 1) html += ", ";
            });
            html += " ]</b>";

            if (node.children && node.children.length > 0) {
                html += "<ul>";
                node.children.forEach(child => {
                    html += this.renderTree(child);
                });
                html += "</ul>";
            }

            html += "</li>";
            html += "</ul>";

            return html;
        }

    },

    mounted() {
        this.load();
    }

}).mount("#app");
</script>

</body>
</html>
